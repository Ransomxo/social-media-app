name: Deploy to DigitalOcean

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@master
        with:
          host: 137.184.15.8
          username: root
          key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}
          script: |
            cd /root/social-media-app
            git pull
            pnpm install
            cd packages/frontend
            pnpm build
            pm2 restart frontend

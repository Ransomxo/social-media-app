name: Deploy to DigitalOcean

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Install SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DIGITALOCEAN_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 137.184.15.8 >> ~/.ssh/known_hosts
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa
      
      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18.20.7'
          
      - name: Install pnpm
        run: npm install -g pnpm@9.15.1
      
      - name: Deploy to DigitalOcean
        run: |
          ssh -o StrictHostKeyChecking=no root@137.184.15.8 "cd /root/social-media-app && \
            git fetch && \
            git checkout ${{ github.head_ref }} && \
            pnpm install && \
            cd packages/frontend && \
            pnpm build && \
            pm2 restart frontend && \
            echo 'Deployment completed successfully'"
